# NGINX production reverse proxy for Ciudad Reporta.
# Replace "ciudad-reporta.example.com" and certificate paths before deploying.

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

upstream ciudad_reporta_api {
  server 127.0.0.1:3001;
  keepalive 16;
}

server {
  listen 80;
  server_name ciudad-reporta.example.com;

  # Use this redirect after HTTPS certificates are configured.
  # return 301 https://$host$request_uri;

  root /var/www/ciudad-reporta/frontend/dist;
  index index.html;

  client_max_body_size 512k;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(self)" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  location /api/trabajadores/login {
    limit_req zone=login_limit burst=5 nodelay;
    proxy_pass http://ciudad_reporta_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://ciudad_reporta_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

# For HTTPS, copy this server block, change "listen 80" to
# "listen 443 ssl http2", add ssl_certificate / ssl_certificate_key, and enable:
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
